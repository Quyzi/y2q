# config.default.toml — reference showing every knob and its default.
#
# Copy this file to config.toml and fill in the fields marked "required".
# Fields without a default have no compiled-in fallback and must be set.
#
# Override any value at runtime without editing the file:
#   Environment variable:  Y2QD_SECTION__KEY=value   (double-underscore for nesting)
#   Command-line:          y2qd --set section.key=value

# ---------------------------------------------------------------------------
# [server] — HTTP listener
# ---------------------------------------------------------------------------
[server]
host             = "127.0.0.1"  # required — IP address to bind
port             = 8080         # required — TCP port

# Maximum request body size accepted for PUT uploads.
max_body_bytes = 268435456  # 256 MiB

# When true, the metrics dashboard (/metrics/dashboard), Prometheus scrape
# endpoint (/metrics/prometheus), and Swagger UI (/swagger-ui/) are reachable
# without a Bearer token. Keep false in production.
unauthenticated_metrics = false

# ---------------------------------------------------------------------------
# [server.actix] — actix HttpServer tuning knobs
#
# The entire section is optional. Omitting it leaves actix's own defaults.
# ---------------------------------------------------------------------------
[server.actix]

# Number of worker threads. Comment out (or remove) to use the number of
# logical CPUs reported by the OS.
# workers = 4

# TCP listen backlog — depth of the kernel's accept queue.
backlog = 1024

# Maximum concurrent connections handled per worker thread.
max_connections = 25000

# Keep-alive idle timeout in seconds. Set to 0 to disable keep-alive.
keep_alive_secs = 5

# How long to wait for the first request bytes after accepting a connection,
# in seconds. Connections that stay silent longer are closed.
client_request_timeout_secs = 5

# How long to wait for the client to close its side of the connection after
# the final response has been sent, in seconds.
client_disconnect_timeout_secs = 1

# Graceful shutdown window in seconds. In-flight requests have this long to
# complete after a SIGTERM before the process exits.
shutdown_timeout_secs = 30

# ---------------------------------------------------------------------------
# [server.tls] — HTTPS / TLS listener
#
# When enabled = true, the daemon binds HTTPS at [server] port using rustls
# and refuses plaintext HTTP entirely. Both cert_path and key_path must be
# set and point to PEM-encoded files. The private key may be PKCS#8, PKCS#1,
# or SEC1 encoded.
#
# To run plaintext HTTP and HTTPS side by side, run two y2qd processes on
# different ports — this section flips a single listener between modes.
# ---------------------------------------------------------------------------
[server.tls]
enabled   = false
# cert_path = "/etc/y2q/tls/fullchain.pem"
# key_path  = "/etc/y2q/tls/privkey.pem"
#
# Optional: enforce mutual TLS. When set, every client must present a
# certificate that chains to one of the CAs in this PEM bundle; otherwise the
# handshake is rejected. Leave unset to accept any client without client-cert
# verification.
# client_ca_path = "/etc/y2q/tls/client-ca.pem"
#
# Require a post-quantum (X25519MLKEM768 hybrid) key exchange on every TLS
# handshake. When true (default), the daemon offers ONLY the PQ-hybrid group;
# clients that cannot negotiate it are refused at handshake time. Set to false
# to fall back to the default rustls preference list (PQ preferred but classic
# X25519/ECDH groups still offered).
require_pq_kex = true

# ---------------------------------------------------------------------------
# [storage] — object storage backend
# ---------------------------------------------------------------------------
[storage]

# Storage backend implementation.
#   "filesystem"  — portable tokio::fs backend (default)
#   "uring"       — Linux io_uring fast path (Linux only, kernel ≥ 5.6)
backend = "filesystem"

# Root directory for stored objects. Created on first write if absent.
base_path = "/var/lib/y2q/data"  # required

# Path to the redb metadata index. Defaults to <base_path>/_y2q_index.redb.
# index_path = "/var/lib/y2q/data/_y2q_index.redb"

# Limits on X-Y2Q-<label> custom headers accepted on PUT requests.
max_labels            = 32    # maximum number of label headers per request
max_label_name_bytes  = 64    # maximum byte length of a label name
max_label_value_bytes = 1024  # maximum byte length of a label value

# Background fsync interval for best-effort PUTs (seconds). The daemon
# fsyncs all pending dirty objects at this cadence. Minimum: 1. Default: 5.
sync_flush_interval_secs = 5

# Queue depth that triggers an immediate fsync pass before the timer fires.
# When this many best-effort PUTs are pending flush, the flusher wakes early.
# Entries are never dropped — this is a watermark, not a hard cap. Default: 64.
sync_flush_limit = 64

# Default durability for PUT requests that omit the X-Y2Q-Sync header.
#   "durable"      — fdatasync on the object file + fsync on the parent directory
#                    before returning success. Crash-safe. (default)
#   "best-effort"  — no fsync. Higher throughput; an unclean shutdown can lose
#                    a recently-PUT object even though the API returned success.
# Per-request override: X-Y2Q-Sync: best-effort  (or: durable)
default_sync = "durable"

# ---------------------------------------------------------------------------
# [storage.uring] — io_uring ring builder tunables (Linux only)
# Only relevant when backend = "uring". All options default to tokio-uring's
# own defaults and can be omitted entirely.
# ---------------------------------------------------------------------------
# [storage.uring]

# Number of dedicated io_uring worker threads. Defaults to logical CPU count.
# workers = 8

# Submission queue (SQ) ring size. Must be a power of two. Default: 256.
# sq_entries = 256

# Completion queue (CQ) ring size. Omit to let the kernel choose (≥ 2x sq_entries).
# cq_entries = 512

# Enable kernel-side SQ polling thread (IORING_SETUP_SQPOLL). Eliminates
# io_uring_enter syscalls on the submission hot path. Requires CAP_SYS_NICE
# or CAP_SYS_ADMIN. Default: false.
# sq_poll = false

# Milliseconds before the SQ poll thread sleeps when idle. Only meaningful
# when sq_poll = true. Default: 2000.
# sq_poll_idle_ms = 2000

# Pin the SQ poll thread to a specific CPU. Omit for no affinity. Only
# meaningful when sq_poll = true.
# sq_poll_cpu = 0

# Busy-poll for I/O completions (IORING_SETUP_IOPOLL). Reduces latency on
# NVMe devices that support polled I/O. Default: false.
# io_poll = false

# Declare single-thread submission (IORING_SETUP_SINGLE_ISSUER). Each worker
# thread owns its own ring, so this is always accurate and enables kernel
# optimisations. Default: true.
# single_issuer = true

# Cooperative task-run scheduling (IORING_SETUP_COOP_TASKRUN). Reduces
# interrupt overhead at the cost of slightly higher per-task latency.
# Default: false.
# coop_taskrun = false

# Object size threshold (bytes) at or above which writes switch to the O_DIRECT
# path with aligned buffers. Below this, buffered uring writes are used.
# Default: 4194304 (4 MiB).
# large_object_bytes = 4194304

# ---------------------------------------------------------------------------
# [crypto] — keystore and key-derivation settings
# ---------------------------------------------------------------------------
[crypto]

# Directory holding pubkey.json, users.redb, and the daemon-wide lock file.
# Must NOT be located under storage.base_path — keep keys and data separate.
keystore_dir = "/var/lib/y2q/keys"  # required

# Plaintext chunk size (bytes) for v2 streaming encryption. Default 4 MiB.
# Recorded per-object in the envelope header, so changing it only affects objects
# written AFTER the change — existing objects keep decrypting with their own stored
# size. Smaller chunks make ranged reads finer-grained but add per-chunk overhead.
# Bounds: 65536 (64 KiB) .. 268435456 (256 MiB).
envelope_chunk_size_bytes = 4194304

[crypto.argon2]
# Argon2id parameters used when hashing passwords for new user records.
m_cost_kib = 65536  # memory cost — 64 MiB
t_cost     = 3      # time cost (iterations)
p_cost     = 4      # parallelism (lanes)

# ---------------------------------------------------------------------------
# [auth] — session and account-lockout policy
# ---------------------------------------------------------------------------
[auth]

# Default session lifetime when the login request omits ttl_seconds.
default_ttl_seconds = 3600  # 1 hour

# Hard ceiling. Login requests specifying ttl_seconds above this are rejected.
max_ttl_seconds = 86400  # 24 hours

# How often the background task sweeps expired sessions from memory.
session_sweep_interval_seconds = 300  # 5 minutes

# Minimum delay before a failed-login response is returned, in milliseconds.
# Argon2id already dominates this; the floor smooths timing differences
# between known and unknown usernames.
min_login_response_ms = 250

# Consecutive failed logins before the account is locked. 0 disables lockout.
max_failed_logins = 10

# How long an account stays locked after exceeding max_failed_logins.
lockout_seconds = 900  # 15 minutes

# Drop the in-memory decrypted secret key this many seconds after the last
# session expires. 0 drops it immediately. Raise this value to tolerate brief
# gaps between sessions without requiring a keystore unlock each time.
keystore_idle_drop_seconds = 0

# Enforce bucket ownership/ACLs and the global admin role. When true (default),
# new buckets are private to their creator, access is governed by per-bucket
# grants, and admin endpoints (user management, index rebuild, lock clearing,
# trace) require an admin account. Set false for a single-user or migration
# deployment where every authenticated user should have full access.
enforce_authorization = true

# ── Observability ─────────────────────────────────────────────────────────────
[observability]

# Logging filter directive, in RUST_LOG syntax. Controls which crates and
# modules emit log output and at what level.
# Examples: "info", "y2qd=debug,actix_web=info"
# The RUST_LOG environment variable takes precedence over this value when set.
log_filter = "info"

# Log output format.
# "text" — human-readable coloured output (default).
# "json" — structured JSON, one object per line; suited for log aggregators
#          such as Grafana Loki, Elasticsearch, or Datadog.
log_format = "text"

# ---------------------------------------------------------------------------
# [observability.pyroscope] — continuous CPU profiling via Pyroscope / pprof-rs
#
# Requires building with `--features pyroscope`. Disabled by default.
# Point server_url at a local Pyroscope instance or a Grafana Cloud endpoint.
# ---------------------------------------------------------------------------
[observability.pyroscope]
enabled     = false
server_url  = "http://localhost:4040"
sample_rate = 100   # pprof sampling rate in Hz

# Grafana Cloud credentials. Omit (or comment out) for unauthenticated servers.
# basic_auth_user     = "123456"   # numeric user ID shown in the Grafana Cloud UI
# basic_auth_password = "glc_..."  # Grafana Cloud API token with profiling write scope

# ---------------------------------------------------------------------------
# [cluster] — distributed storage (CRAQ data plane + embedded raft control plane)
#
# Disabled by default: with `enabled = false` the daemon runs as a single node
# with no clustering behavior whatsoever. The whole section is optional and every
# key is defaulted. Enabling clustering requires the SAME deployment keystore on
# every node (the metadata key is derived deterministically from it).
# ---------------------------------------------------------------------------
[cluster]
enabled = false                  # master switch; false => single node

# node_id          = ""          # explicit u64 id; empty => derive + persist one
# advertise_addr   = ""          # host:port peers dial for the internal API (required when enabled)
replication_factor     = 3       # R = chain length (replicas per object); clamped to membership
virtual_nodes_per_node = 256     # consistent-hash ring smoothing
consistency            = "strong" # strong | eventual | eventual-bounded
eventual_bound_ms      = 2000    # freshness window for eventual-bounded reads
prepare_timeout_ms     = 30000   # per-hop PREPARE forward timeout
ack_timeout_ms         = 30000   # HEAD wait for full-chain commit
auth                   = "shared-secret" # shared-secret | mtls
# shared_secret    = ""          # prefer Y2QD_CLUSTER__SHARED_SECRET
health_probe_interval_ms = 1000
health_fail_threshold    = 3     # consecutive failed probes before suspect/down
unlock                 = "provisioned" # SK unwrapped at boot so peer writes commit unattended
# unlock_secret_file = ""        # or set Y2QD_CLUSTER__UNLOCK_SECRET

# Embedded raft control plane (replicates only topology + auth/bucket metadata).
[cluster.raft]
heartbeat_interval_ms  = 250
election_timeout_min_ms = 1000
election_timeout_max_ms = 1500
# log_dir  = ""                  # empty => <storage.base_path>/_y2q_raft
bootstrap = false                # true on exactly ONE node's first boot
role      = "auto"               # auto (use voter_seeds) | voter | learner
voter_seeds = []                 # node ids forming the voting quorum (size 3/5/7)
