name: Post-merge build

on:
  push:
    branches: [main]

concurrency:
  group: post-merge-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}
  IMAGE_CLUSTER: ghcr.io/${{ github.repository }}-cluster

jobs:
  verify:
    name: fmt, clippy, build, test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: install system dependencies
        run: sudo apt-get install -y libfuse3-dev

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo build
        run: cargo build --all-targets --all-features

      - name: cargo test
        run: cargo test

  image:
    name: Build + push images
    needs: verify
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Short SHA + lowercase image names
        id: vars
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "IMAGE=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
          echo "IMAGE_CLUSTER=$(echo "$IMAGE_CLUSTER" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push y2q image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:main
            ${{ env.IMAGE }}:sha-${{ steps.vars.outputs.sha_short }}

      - name: Build + push cluster image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/cluster/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_CLUSTER }}:main
            ${{ env.IMAGE_CLUSTER }}:sha-${{ steps.vars.outputs.sha_short }}
